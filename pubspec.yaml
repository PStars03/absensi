name: absensi
description: "EduPresence — Aplikasi Mobile Absensi Biometrik & E-Learning"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.14.2
  intl: ^0.19.0
  file_picker: ^11.0.2
  geolocator: ^13.0.2
  permission_handler: ^12.0.0
  url_launcher: ^6.3.1
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  http: ^1.6.0
  camera: ^0.12.0+1
  google_mlkit_face_detection: ^0.13.2
  tflite_flutter: ^0.12.1
  image: ^4.8.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  supabase: ^2.12.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/models/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
